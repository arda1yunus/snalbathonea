<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Makale Ekle</title>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/addartstyle.css">
    
</head>
<body>
    <div class="container">
        <a href="/admin.html">← Geri Dön</a>
        <h2>Yeni Makale Oluştur</h2>
        <input type="text" id="title" placeholder="Makale Başlığı">
        <input type="text" id="author" placeholder="Yazar Adı">
        <input type="text" id="summary" maxlength="50" placeholder="Kısa Özet (Kartta görünecek)">
        <input type="text" id="hashtags" placeholder="Hashtags (virgülle ayır, örn: psikoloji,sınav)">
        <div id="editor"></div>
        <button class="btn" onclick="save()">START DA MAGIC✨</button>
    </div>

    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script>
        var quill = new Quill('#editor', {
            theme: 'snow',
            modules: {
                toolbar: {
                    container: [[{'header': [1, 2, false]}], ['bold', 'italic', 'underline'], ['image', 'code-block'], [{'list': 'ordered'}, {'list': 'bullet'}]]
                }
            }
        });

        // Resim Yükleme Handler'ı (boyut sınırlandırma)
        quill.getModule('toolbar').addHandler('image', () => {
            const input = document.createElement('input');
            input.setAttribute('type', 'file');
            input.setAttribute('accept', 'image/*');
            input.click();
            input.onchange = async () => {
                let file = input.files[0];
                if (!file) return;
                // max genişlik/yükseklik piksel
                const MAX_DIM = 1200;
                // resize using canvas if gerekli
                const resizedBlob = await new Promise(resolve => {
                    const img = new Image();
                    img.onload = () => {
                        let { width, height } = img;
                        if (width > MAX_DIM || height > MAX_DIM) {
                            const scale = Math.min(MAX_DIM / width, MAX_DIM / height);
                            width = Math.round(width * scale);
                            height = Math.round(height * scale);
                        }
                        const canvas = document.createElement('canvas');
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        canvas.toBlob(blob => resolve(blob), file.type || 'image/jpeg');
                    };
                    img.src = URL.createObjectURL(file);
                });

                const formData = new FormData();
                // kullanacağımız blob ise resizedBlob, yoksa orijinal file
                formData.append('image', resizedBlob || file, file.name);
                const res = await fetch('/api/upload', { method: 'POST', body: formData });
                const data = await res.json();
                const range = quill.getSelection();
                quill.insertEmbed(range.index, 'image', data.url);
            };
        });

        async function save() {
            const rawTags = document.getElementById('hashtags').value;
            const hashtags = rawTags.split(',').map(t=>t.trim()).filter(Boolean);
            const article = {
                title: document.getElementById('title').value,
                author: document.getElementById('author').value,
                hashtags,
                summary: document.getElementById('summary').value,
                content: quill.root.innerHTML
            };
            const res = await fetch('/api/articles', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(article)
            });
            if(res.ok) { alert("Başarıyla eklendi!"); window.location.href="/admin.html"; }
        }
    </script>
</body>
</html>
