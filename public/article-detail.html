<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Makale Detayı</title>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <link rel="stylesheet" href="/../css/style.css">
    <style>
        
        .body{
                font-family: 'Playpen Sans Thai', sans-serif;
                background: #f4f4f4;
            
        }
        .container { max-width: 800px; margin: 50px auto; padding: 20px;  }
        #content img { max-width: 100%; height: auto; }
        .ql-editor { padding: 0; overflow-y: visible; }
        
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #333;
            text-decoration: none;
            font-size: 16px;
        }
        .hashtags { text-align: right; color: var(--primary-color); margin: 5px 0; }
        
        .main-content {
            display: grid;  
            grid-template-columns: 1fr 300px;
            gap: 30px;
            align-items: start;
            padding: 50px;
        }

        .article-content {
            flex: 1;
        }

        .sidebar {
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            height: fit-content;
            position: relative;
            top: 50px;
            
        }

        .sidebar h3 {
            margin-top: 0;
            font-size: 18px;
            color: var(--primary-color);
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 10px;
            margin-bottom: 15px;
            text-align: center;
        }

        .article-box {
            padding: 12px;
            margin-bottom: 12px;
            border-left: 4px solid var(--primary-color);
            background-color: #f9f9f9;
            cursor: pointer;
            transition: all 0.3s ease;
            border-radius: 200px;
        }

        .article-box:hover {
            background-color: #f0f0f0;
            transform: translateX(5px);
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .article-box-title {
            font-weight: 600;
            font-size: 14px;
            color: #333;
            margin: 0 0 5px 0;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .article-box-author {
            font-size: 12px;
            color: #888;
            margin: 0;
        }

        @media (max-width: 1024px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            .sidebar {
                position: relative;
                top: 0;
            }
        }
        
    </style>
</head>
<body>
    <div class="navbar">
        <h1>SNAL BATHONEA PSIKOLOJI KULUBU</h1>
        <div class="pagebox">
            <a href="/" class="active">Anasayfa</a>
            <a href="/articles.html">📚 Makaleler</a>    
            <a href="/podcasts.html">🎙️ BatheaCast</a>
            <a href="/admin.html" class="admin"><ion-icon name="shield-outline"></ion-icon></a>
        </div>
    </div>

    <div class="container">
        <a  class="back-link" href="/articles.html">← Makalelere Dön</a>
        
        <div class="main-content">
            <div class="article-content">
                <h1 id="title">Yükleniyor...</h1>
                <h4 id="author" style="color:#666; margin-top:4px;">&nbsp;</h4>
                <p id="hashtags" class="hashtags"></p>
                <hr>
                <div id="content" class="ql-editor"></div>
            </div>

            <div class="sidebar">
                <h3>📖 Bunlarda İlginizi Çekebilir</h3>
                <div id="randomArticles"></div>
            </div>
        </div>
    </div>

    <script>
        async function load() {
            const id = window.location.pathname.split('/').pop().replace(/[:].*$/, "");
            const res = await fetch(`/api/articles/${id}`);
            if(!res.ok) return document.getElementById('title').innerText = "Hata!";
            
            const data = await res.json();
            document.getElementById('title').innerText = data.title;
            document.getElementById('author').innerText = data.author ? 'By ' + data.author : '';
            if(data.hashtags && data.hashtags.length) {
                document.getElementById('hashtags').innerText = data.hashtags.map(t=>"#"+t).join(' ');
            }
            document.getElementById('content').innerHTML = data.content;
            
            // Kenar çubuğuna rastgele makaleler yükle
            loadRandomArticles(id);
        }

        async function loadRandomArticles(currentArticleId) {
            try {
                const res = await fetch('/api/articles');
                if(!res.ok) return;
                
                const articles = await res.json();
                
                // Mevcut makale hariç diğer makaleleri filtrele
                const otherArticles = articles.filter(a => a._id !== currentArticleId);
                
                // Eğer 5'ten az makale varsa hepsini göster, yoksa rastgele 5 tane seç
                const selectedArticles = otherArticles.length <= 5 
                    ? otherArticles 
                    : getRandomArticles(otherArticles, 5);
                
                displaySidebarArticles(selectedArticles);
            } catch (err) {
                console.error('Hata:', err);
            }
        }

        function getRandomArticles(articles, count) {
            const shuffled = [...articles].sort(() => Math.random() - 0.5);
            return shuffled.slice(0, count);
        }

        function displaySidebarArticles(articles) {
            const container = document.getElementById('randomArticles');
            container.innerHTML = '';
            
            articles.forEach(article => {
                const box = document.createElement('div');
                box.className = 'article-box';
                box.onclick = () => {
                    window.location.href = `/articles/${article._id}`;
                };
                
                box.innerHTML = `
                    <p class="article-box-title">${article.title}</p>
                    <p class="article-box-author">${article.author || 'Belirtilmemiş'}</p>
                `;
                
                container.appendChild(box);
            });
        }

        load();
    </script>
</body>
</html>
