<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Makale Düzenle</title>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/addartstyle.css">
</head>
<body>
    <div class="container">
        <a href="/admin.html">← Admin Panele Dön</a>
        <h2>Makaleyi Düzenle</h2>
        <input type="text" id="title" placeholder="Makale Başlığı">
        <input type="text" id="author" placeholder="Yazar Adı">
        <input type="text" id="summary" maxlength="150" placeholder="Kısa Özet">
        <input type="text" id="hashtags" placeholder="Hashtags (virgülle ayır, örn: psikoloji,sınav)">
        <div id="editor"></div>
        <button class="btn" onclick="update()">DEĞİŞİKLİKLERİ KAYDET ✨</button>
    </div>

    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script>
        // Sayfa yüklendiğinde çalışacak fonksiyon
async function init() {
    // 1. Önce admin yetkisi var mı kontrol et
    const authRes = await fetch("/api/articles/check-admin"); // Rota ismini kontrol et
    if (!authRes.ok) {
        alert("Bu sayfaya erişim yetkiniz yok!");
        window.location.href = "/admin.html"; // Yetkisizse admin panele veya anasayfaya yolla
        return;
    }

    // 2. Yetkisi varsa makale verilerini yükle
    loadArticleData();
}

// Sayfa açıldığında başlat
init();
        // Quill Editör Kurulumu
        var quill = new Quill('#editor', {
            theme: 'snow',
            modules: {
                toolbar: [
                    [{'header': [1, 2, false]}], 
                    ['bold', 'italic', 'underline'], 
                    ['image', 'code-block'], 
                    [{'list': 'ordered'}, {'list': 'bullet'}]
                ]
            }
        });

        // URL'den makale ID'sini al (Örn: edit-article.html?id=64abcd...)
        const urlParams = new URLSearchParams(window.location.search);
        const articleId = urlParams.get('id');

        // Sayfa açıldığında mevcut makale verilerini çek ve kutulara doldur
        async function loadArticleData() {
            if (!articleId) {
                alert("Geçerli bir makale ID'si bulunamadı!");
                return;
            }

            try {
                // Senin backend'deki Tekil Makale Getir rotana istek atıyoruz
                const res = await fetch(`/api/articles/${articleId}`);
                if (!res.ok) throw new Error("Makale bulunamadı");
                
                const article = await res.json();
                
                // Gelen verileri inputlara doldur
                document.getElementById('title').value = article.title;
                document.getElementById('author').value = article.author;
                document.getElementById('summary').value = article.summary;
                document.getElementById('hashtags').value = article.hashtags.join(', '); // Diziyi virgüle çevir
                
                // Quill editörün içine HTML içeriğini bas
                quill.root.innerHTML = article.content;
            } catch (err) {
                console.error(err);
                alert("Makale yüklenirken hata oluştu.");
            }
        }



        // Sayfa yüklenince veriyi çek
        window.onload = loadArticleData;

        // Güncelleme İşlemi (PUT İsteği)
        async function update() {
            const rawTags = document.getElementById('hashtags').value;
            const hashtags = rawTags.split(',').map(t => t.trim()).filter(Boolean);
            
            const updatedArticle = {
                title: document.getElementById('title').value,
                author: document.getElementById('author').value,
                hashtags: hashtags,
                summary: document.getElementById('summary').value,
                content: quill.root.innerHTML
            };

            const res = await fetch(`/api/articles/${articleId}`, {
                method: 'PUT', // Ekleme (POST) yerine Güncelleme (PUT) kullanıyoruz
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(updatedArticle)
            });

            if(res.ok) { 
                alert("Değişiklikler başarıyla kaydedildi!"); 
                window.location.href = "/admin.html"; 
            } else {
                alert("Güncelleme sırasında bir sorun oluştu.");
            }
        }
    </script>
</body>
</html>
