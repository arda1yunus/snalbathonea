<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Giriş Yap</title>
    <link rel="stylesheet" href="css/login.css">
    <link rel="icon" type="image/x-icon" href="logo.png">
</head>
<body>

    <div class="gradient"></div>

    <div class="login-container">
        <h2>Access 2 Admin </h2>
        <input type="text" id="usernameInput" placeholder="Kullanıcı Adı" value="admin" disabled>
        <input type="password" id="passInput" placeholder="Şifreyi girin">
        <div class="passwordcont">
        <button id="togglePassword" onclick="togglePassword()"><ion-icon name="eye-outline"></ion-icon></button>
        </div>
        <button onclick="login()">Giriş Yap</button>
    </div>

    <script>    
        function togglePassword() {
            const passInput = document.getElementById("passInput");
            const toggleBtn = document.getElementById("togglePassword");
            if (passInput.type === "password") {
                passInput.type = "text";
                toggleBtn.innerHTML = '<ion-icon name="eye-off-outline"></ion-icon>';
            } else {
                passInput.type = "password";
                toggleBtn.innerHTML = '<ion-icon name="eye-outline"></ion-icon>';
            }
        }

        async function login() {
            const password = document.getElementById("passInput").value;
            const res = await fetch("/api/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ password })
            });
            const data = await res.json();
            if (data.success) {
                window.location.href = "/admin.html";
            } else {
                alert(data.message);
            }
        }
    </script>
</body>
</html>
<script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
<script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
