<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Podcastler</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f5f5f5;
      padding: 2rem 1rem;
    }

    .podcast-list {
      max-width: 860px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .podcast-card {
      background: #ffffff;
      border: 1px solid #e0e0e0;
      border-radius: 16px;
      padding: 1.5rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
  </style>
</head>
<body>

<div class="podcast-list">

  <div class="podcast-card">
    <iframe style="border-radius:12px" src="https://open.spotify.com/embed/show/2ml5bd9NO9bolIE0PiAHAn?utm_source=generator&si=6ea572538ee74d25" width="100%" height="352" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
  </div>

  <div class="podcast-card">
    <iframe style="border-radius:12px" src="https://open.spotify.com/embed/episode/4XREmSLMLdPUA1ZKiiyA1k?utm_source=generator&si=c1b4890cca4b4d86" width="100%" height="352" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
  </div>

</div>

</body>
</html>
